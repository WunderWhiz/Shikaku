<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shikaku</title>
  <link rel="stylesheet" href="style.css?v=4" />
</head>
<body>
  <header class="bar">
    <div class="left">
      <div class="title">Shikaku</div>
      <label class="name">
        <span>Player</span>
        <input id="playerName" type="text" maxlength="24" placeholder="Your name" />
      </label>
    </div>

    <div class="right">
      <div class="timerBox">
        <span class="timerLabel">Time</span>
        <span id="timer" class="timer">00:00</span>
      </div>

      <label class="size">
        <span>Size</span>
        <select id="sizeSelect">
          <option value="10">10×10</option>
          <option value="12">12×12</option>
          <option value="18">18×18</option>
        </select>
      </label>

      <button id="nextBtn" type="button">Next Puzzle</button>
      <button id="resetBtn" type="button">Reset</button>
    </div>
  </header>

  <main class="wrap">
    <div id="board" class="board" aria-label="Shikaku board"></div>
    <div id="status" class="status" aria-live="polite"></div>
    <div class="hint">
      Drag to draw a rectangle. It only places if the rectangle has exactly one number and the area matches that number.
      Tap any filled cell to delete that rectangle.
    </div>
  </main>

  <script src="app.js?v=4"></script>
</body>
</html>
